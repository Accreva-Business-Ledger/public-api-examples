name: Validate examples

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python scripts/validate_journal_entry.py examples/journal-entry-proposal.json
      - run: python -m unittest discover -s tests -v
